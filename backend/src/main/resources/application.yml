server:
  port: ${PORT:8080}

spring:
  application:
    name: cars15-backend
  datasource:
    url: ${DB_URL:jdbc:h2:mem:cars15;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: ${JWT_SECRET:cars15-demo-secret-key-that-is-long-enough-for-hmac}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:720}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3025,http://localhost:3000,https://cars15.vercel.app}
