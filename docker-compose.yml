services:
  mysql:
    image: mysql:8.4
    container_name: cars15-mysql
    environment:
      MYSQL_DATABASE: cars15
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_USER: cars15
      MYSQL_PASSWORD: cars15pass
    ports:
      - "3307:3306"
    volumes:
      - cars15_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: cars15-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/cars15
      DB_USERNAME: cars15
      DB_PASSWORD: cars15pass
      DB_DRIVER: com.mysql.cj.jdbc.Driver
      JWT_SECRET: cars15-compose-secret-key-with-more-than-32-characters
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3025
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
    container_name: cars15-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"

volumes:
  cars15_mysql:
